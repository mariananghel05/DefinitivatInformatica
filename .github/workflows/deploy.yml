name: Deploy VitePress pe GitHub Pages

on:
  push:
    branches: [main] # schimbă în „master" dacă ramura ta principală se numește așa
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Permite un singur deploy concurent
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # necesar pentru „ultima actualizare" (git log)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true # activează Pages (sursă „GitHub Actions") dacă nu e deja provizionat
      - name: Install
        run: npm ci
      - name: Build
        run: npm run docs:build
        env:
          # /nume-repo/ pentru site de proiect; / pentru site de utilizator (user.github.io)
          DOCS_BASE: ${{ endsWith(github.repository, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
